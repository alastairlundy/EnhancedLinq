name: Publish to Nuget

on:
  workflow_dispatch:
     inputs:
      enhancedlinq-version:
         type: string
         required: true

permissions:
  contents: read

jobs:
  build-and-publish:
      runs-on: ubuntu-latest
  
      permissions:
        id-token: write 
      environment: production
        
      steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.0.x
      - name: Restore dependencies
        run: dotnet restore
        working-directory: src
      - name: Create packages
        run: dotnet build -c Release
        working-directory: src

      - name: Create local nupkg output dir
        run: mkdir -p ./nupkgs

      # Build EnhancedLinq
      - name: Build EnhancedLinq
        run: dotnet build src/EnhancedLinq -c Release

      # Pack EnhancedLinq into ./nupkgs
      - name: Pack EnhancedLinq to local feed
        run: dotnet pack src/EnhancedLinq -c Release -o ./nupkgs

      # Use local feed for EnhancedLinq.Memory
      - name: Restore EnhancedLinq from local feed + NuGet.org
        run: dotnet restore src/EnhancedLinq.Memory -s ./nupkgs -s https://api.nuget.org/v3/index.json

      - name: Build Memory (resolves EnhancedLinq from local feed)
        run: dotnet build src/EnhancedLinq.Memory -c Release -p:EnhancedLinqVersion=${{ inputs.enhancedlinq-version }}

      # Get a short-lived NuGet API key
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        id: login
        with:
            user: ${{ secrets.NUGET_USER }}
              
          # Push the package
      - name: NuGet push
        run: dotnet nuget push src/EnhancedLinq/bin/Release/*.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json

      - name: NuGet push
        run: dotnet nuget push src/EnhancedLinq.Async/bin/Release/*.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json
           
        # Push the Memory package
      - name: NuGet push
        run: dotnet nuget push src/EnhancedLinq.Memory/bin/Release/*.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json
